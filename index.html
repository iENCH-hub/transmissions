```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRANSMISSION // 001</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial,Helvetica,sans-serif;
}

/* VIDEO */
#background{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
}

#background video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* GRAIN */
#grain{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.07;

    background-image:
    repeating-linear-gradient(
        0deg,
        rgba(255,255,255,.08) 0px,
        rgba(255,255,255,.08) 1px,
        transparent 1px,
        transparent 3px
    );

    z-index:2;
}

/* VIGNETTE */
#overlay{
    position:fixed;
    inset:0;
    pointer-events:none;

    background:
    radial-gradient(
        circle,
        transparent 20%,
        rgba(0,0,0,.6) 100%
    );

    z-index:3;
}

/* INTRO */
#intro{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;

    z-index:10;

    transition:1.2s;
}

#intro.hidden{
    opacity:0;
    pointer-events:none;
}

/* TITRES */

.small{
    font-size:12px;
    letter-spacing:6px;
    margin-bottom:20px;
}

.title{
    font-size:34px;
    letter-spacing:10px;
}

/* BOUTON */

button{

    margin-top:50px;

    background:none;
    border:1px solid rgba(255,255,255,.6);

    color:white;

    padding:14px 34px;

    cursor:pointer;

    letter-spacing:4px;

    transition:.3s;
}

button:hover{

    background:white;
    color:black;

}

/* MESSAGE */

#message{

    position:absolute;

    left:8%;
    bottom:10%;

    max-width:500px;

    color:white;

    opacity:0;

    transition:2.5s;

    z-index:5;

}

#message.visible{

    opacity:1;

}

.quote{

    font-size:25px;
    line-height:1.4;

}

.signature{

    margin-top:30px;
    letter-spacing:5px;
    opacity:.8;

}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:24px;
}

.quote{
font-size:21px;
}

}

</style>

</head>

<body>

<!-- VIDEO -->

<div id="background">

<video id="bgvideo" muted loop playsinline preload="auto">

<source src="TRANSMISSION-001.mp4" type="video/mp4">

</video>

</div>

<!-- GRAIN -->

<div id="grain"></div>

<!-- VIGNETTE -->

<div id="overlay"></div>

<!-- INTRO -->

<div id="intro">

<div class="small">
TRANSMISSION
</div>

<div class="title">
001
</div>

<button onclick="enterTransmission()">
REVEAL
</button>

</div>

<!-- MESSAGE -->

<div id="message">

<div class="quote">
“Let's dance on the ruins of our Alchemy”
</div>

<div class="signature">
i
</div>

</div>

<!-- AUDIO -->

<audio id="audio" loop>

<source src="transmission 001 sound.mp3" type="audio/mpeg">

</audio>

<script>

function enterTransmission(){

    document.getElementById("intro").classList.add("hidden");

    const video=document.getElementById("bgvideo");
    const audio=document.getElementById("audio");

    video.play();
    audio.play();

    setTimeout(function(){

        document.getElementById("message").classList.add("visible");

    },2000);

}

</script>

</body>
</html>
