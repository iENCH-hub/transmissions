<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRANSMISSION // 001</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, Helvetica, sans-serif;
}

/* IMAGE CENTRÉE */
#background {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 0;
}

#background img {
    max-width: 100%;
    max-height: 100vh;
    width: auto;
    height: auto;
    object-fit: contain;
}

/* GRAIN */
#grain {
    position: fixed;
    inset: 0;
    opacity: .07;
    pointer-events: none;

    background-image:
    repeating-linear-gradient(
        0deg,
        rgba(255,255,255,.08) 0px,
        rgba(255,255,255,.08) 1px,
        transparent 1px,
        transparent 3px
    );
}

/* VIGNETTE */
#overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;

    background: radial-gradient(
        circle,
        transparent 20%,
        rgba(0,0,0,.6) 100%
    );
}

/* INTRO */
#intro {
    position: absolute;
    inset: 0;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    color: white;
    text-align: center;

    z-index: 10;

    transition: 1.2s;
}

#intro.hidden {
    opacity: 0;
    pointer-events: none;
}

/* TITRE */
.small {
    letter-spacing: 6px;
    font-size: 12px;
    margin-bottom: 20px;
}

.title {
    font-size: 34px;
    letter-spacing: 10px;
}

/* BOUTON PLAY */
button {
    margin-top: 50px;

    background: none;
    border: 1px solid rgba(255,255,255,.6);

    color: white;
    padding: 14px 34px;

    letter-spacing: 4px;
    cursor: pointer;

    transition: .3s;
}

button:hover {
    background: white;
    color: black;
}

/* MESSAGE */
#message {
    position: absolute;
    left: 8%;
    bottom: 10%;

    max-width: 500px;

    color: white;
    opacity: 0;

    transition: 3s;

    z-index: 5;
}

#message.visible {
    opacity: 1;
}

.quote {
    font-size: 25px;
    line-height: 1.4;
}

.signature {
    margin-top: 30px;
    letter-spacing: 5px;
    opacity: .8;
}

/* MOBILE */
@media (max-width: 768px) {
    .quote {
        font-size: 22px;
    }

    .title {
        font-size: 24px;
    }
}

</style>

</head>

<body>

<!-- IMAGE -->
<div id="background">
    <img src="TRANSMISSION 001 poulpe.jpg" alt="image">
</div>

<!-- GRAIN -->
<div id="grain"></div>

<!-- VIGNETTE -->
<div id="overlay"></div>

<!-- INTRO -->
<div id="intro">

    <div class="small">TRANSMISSION</div>

    <div class="title">001</div>
<button class="terminal-btn" onclick="enterTransmission()">
REVEAL
</button>

</div>

<!-- MESSAGE -->
<div id="message">

    <div class="quote">
        “Let's dance on the ruins of our Alchemy”
    </div>

    <div class="signature">
      i
    </div>

</div>

<!-- AUDIO -->
<audio id="audio" loop>
    <source src="transmission 001 sound.mp3" type="audio/mpeg">
</audio>

<script>

function enterTransmission() {

    document.getElementById("intro").classList.add("hidden");

    document.getElementById("audio").play();

    setTimeout(() => {
        document.getElementById("message").classList.add("visible");
    }, 2000);

}

</script>

</body>
</html>
